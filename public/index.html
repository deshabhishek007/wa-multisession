<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Multi-Instance Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 1200px;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      padding: 40px;
      margin-bottom: 20px;
    }
    
    .login-card {
      max-width: 400px;
      margin: 0 auto;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    h2 {
      color: #555;
      margin-bottom: 20px;
      font-size: 20px;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button.secondary {
      background: #f5f5f5;
      color: #555;
    }
    
    button.secondary:hover {
      background: #e0e0e0;
    }
    
    button.danger {
      background: #ef4444;
    }
    
    button.danger:hover {
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .instances-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .instance-card {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.3s;
    }
    
    .instance-card.active {
      border-color: #10b981;
    }
    
    .instance-card.pending {
      border-color: #f59e0b;
    }
    
    .instance-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .instance-id {
      font-weight: 600;
      color: #333;
      font-size: 16px;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .status-initializing {
      background: #e0e7ff;
      color: #3730a3;
    }
    
    .status-qr_ready {
      background: #fef3c7;
      color: #92400e;
    }
    
    .status-authenticated {
      background: #d1fae5;
      color: #065f46;
    }
    
    .status-ready {
      background: #d1fae5;
      color: #065f46;
    }
    
    .status-disconnected {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .qr-container {
      margin: 15px 0;
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }
    
    .qr-container img {
      max-width: 100%;
      height: auto;
    }
    
    .instance-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .instance-actions button {
      flex: 1;
      padding: 8px 16px;
      font-size: 14px;
    }
    
    .new-instance-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .new-instance-form input {
      flex: 1;
    }
    
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .success {
      background: #d1fae5;
      color: #065f46;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .hidden {
      display: none;
    }
    
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-left: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="container">
    <div class="card login-card">
      <h1>🔐 Login</h1>
      <p class="subtitle">WhatsApp Multi-Instance Manager</p>
      
      <div id="loginError" class="error hidden"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        
        <button type="submit">Login</button>
      </form>
      
      <p class="subtitle" style="margin-top: 20px; font-size: 12px;">
        Default credentials: admin / admin123
      </p>
    </div>
  </div>
  
  <!-- Dashboard Screen -->
  <div id="dashboardScreen" class="container hidden">
    <div class="card">
      <div class="header">
        <div>
          <h1>📱 WhatsApp Instances</h1>
          <p class="subtitle">Manage multiple WhatsApp Web instances</p>
        </div>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
      
      <div id="dashboardError" class="error hidden"></div>
      <div id="dashboardSuccess" class="success hidden"></div>
      
      <div class="new-instance-form">
        <input type="text" id="newInstanceId" placeholder="Enter instance ID (e.g., client1)">
        <button onclick="createInstance()">Create Instance</button>
      </div>
      
      <div id="instancesGrid" class="instances-grid">
        <!-- Instances will be rendered here -->
      </div>
    </div>
  </div>

  <script>
    // State management
    let ws = null;
    let instances = [];
    
    // Check authentication on load
    checkAuth();
    
    async function checkAuth() {
      try {
        const response = await fetch('/api/check-auth');
        const data = await response.json();
        
        if (data.authenticated) {
          showDashboard();
        } else {
          showLogin();
        }
      } catch (error) {
        showLogin();
      }
    }
    
    // Login handling
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (response.ok) {
          showDashboard();
        } else {
          showError('loginError', 'Invalid credentials');
        }
      } catch (error) {
        showError('loginError', 'Login failed');
      }
    });
    
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      if (ws) ws.close();
      showLogin();
    }
    
    function showLogin() {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('dashboardScreen').classList.add('hidden');
    }
    
    function showDashboard() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboardScreen').classList.remove('hidden');
      initWebSocket();
      loadInstances();
    }
    
    // WebSocket handling
    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);
      
      ws.onopen = () => {
        console.log('WebSocket connected');
        ws.send(JSON.stringify({ type: 'auth' }));
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleWebSocketMessage(data);
      };
      
      ws.onclose = () => {
        console.log('WebSocket disconnected');
        setTimeout(initWebSocket, 3000);
      };
    }
    
    function handleWebSocketMessage(data) {
      const instance = instances.find(i => i.id === data.instanceId);
      
      if (data.type === 'qr') {
        if (instance) {
          instance.status = 'qr_ready';
          instance.qr = data.qr;
          renderInstances();
        }
      } else if (data.type === 'ready') {
        if (instance) {
          instance.status = 'ready';
          instance.qr = null;
          renderInstances();
        }
      } else if (data.type === 'authenticated') {
        if (instance) {
          instance.status = 'authenticated';
          renderInstances();
        }
      } else if (data.type === 'disconnected') {
        if (instance) {
          instance.status = 'disconnected';
          renderInstances();
        }
      }
    }
    
    // Instance management
    async function loadInstances() {
      try {
        const response = await fetch('/api/instances');
        instances = await response.json();
        
        // Subscribe to updates for each instance
        instances.forEach(instance => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'subscribe',
              instanceId: instance.id
            }));
          }
        });
        
        renderInstances();
      } catch (error) {
        showError('dashboardError', 'Failed to load instances');
      }
    }
    
    async function createInstance() {
      const instanceId = document.getElementById('newInstanceId').value.trim();
      
      if (!instanceId) {
        showError('dashboardError', 'Please enter an instance ID');
        return;
      }
      
      try {
        const response = await fetch('/api/instances', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instanceId })
        });
        
        if (response.ok) {
          document.getElementById('newInstanceId').value = '';
          showSuccess('dashboardSuccess', 'Instance created successfully');
          loadInstances();
          
          // Subscribe to this instance's updates
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
              type: 'subscribe',
              instanceId
            }));
          }
        } else {
          const error = await response.json();
          showError('dashboardError', error.error);
        }
      } catch (error) {
        showError('dashboardError', 'Failed to create instance');
      }
    }
    
    async function deleteInstance(instanceId) {
      if (!confirm(`Delete instance ${instanceId}?`)) return;
      
      try {
        const response = await fetch(`/api/instances/${instanceId}`, {
          method: 'DELETE'
        });
        
        if (response.ok) {
          instances = instances.filter(i => i.id !== instanceId);
          renderInstances();
          showSuccess('dashboardSuccess', 'Instance deleted successfully');
        } else {
          showError('dashboardError', 'Failed to delete instance');
        }
      } catch (error) {
        showError('dashboardError', 'Failed to delete instance');
      }
    }
    
    // Rendering
    function renderInstances() {
      const grid = document.getElementById('instancesGrid');
      
      if (instances.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">No instances yet. Create one to get started!</p>';
        return;
      }
      
      grid.innerHTML = instances.map(instance => `
        <div class="instance-card ${instance.status === 'ready' ? 'active' : instance.status === 'qr_ready' ? 'pending' : ''}">
          <div class="instance-header">
            <div class="instance-id">${instance.id}</div>
            <div class="status-badge status-${instance.status}">${instance.status.replace('_', ' ')}</div>
          </div>
          
          ${instance.qr ? `
            <div class="qr-container">
              <img src="${instance.qr}" alt="QR Code">
              <p style="margin-top: 10px; color: #888; font-size: 14px;">Scan with WhatsApp</p>
            </div>
          ` : ''}
          
          ${instance.status === 'ready' ? `
            <p style="color: #10b981; font-weight: 600; text-align: center; margin: 15px 0;">✓ Connected</p>
          ` : ''}
          
          <div class="instance-actions">
            <button class="danger" onclick="deleteInstance('${instance.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    // Utility functions
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }
    
    function showSuccess(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }
  </script>
</body>
</html>
